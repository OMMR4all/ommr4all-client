<mat-form-field>
  <mat-label>Select model</mat-label>
  <mat-select [(ngModel)]="selected" [disabled]="disabled" (ngModelChange)="changeSelected($event)">
    @if (availableModels | async) {
      @for (lm of (modelList | async); track lm.label) {
        <mat-option [value]="lm.model">{{ lm.label }} (Acc: {{ lm.model.accuracy | percent:'1.1-1' }})</mat-option>
      }
    }
  </mat-select>
  <mat-hint>{{ hint }}</mat-hint>
</mat-form-field>
