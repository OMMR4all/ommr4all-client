@if (apiError) {
  <mat-card appearance="outlined">
    <mat-card-header>
      <mat-icon mat-card-avatar>error</mat-icon>
      <mat-card-title i18n>Error</mat-card-title>
      <mat-card-subtitle>Code {{ apiError.errorCode }}</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      {{ apiError.userMessage }}
    </mat-card-content>
    <mat-card-actions>
      <button mat-raised-button color="warn" (click)="dismiss.emit()"><mat-icon>clear</mat-icon><span i18n>Dismiss</span></button>
    </mat-card-actions>
  </mat-card>
}
