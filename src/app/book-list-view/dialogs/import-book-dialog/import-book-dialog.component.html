<h1 mat-dialog-title>Import book</h1>

<div mat-dialog-content>
  <app-api-error-card
    *ngIf="apiError"
    [apiError]="apiError"
    (dismiss)="apiError = null">
  </app-api-error-card>

  <div *ngIf="isUploading" style="margin-bottom: 20px;">
    <mat-progress-bar mode="determinate" [value]="uploadProgress"></mat-progress-bar>
    <small>{{ uploadProgress }}% uploaded</small>
  </div>

  <mat-form-field appearance="outline" style="width: 100%;">
    <mat-label i18n>Book Package (ZIP)</mat-label>

    <ngx-mat-dropzone [formControl]="fileControl" accept="application/zip">
      <mat-icon matPrefix style="margin-right: 8px;">folder_zip</mat-icon>
      <span *ngIf="!fileControl.value" i18n>Drag ZIP here or click to browse</span>
      <span *ngIf="fileControl.value">{{ fileControl.value.name }}</span>
    </ngx-mat-dropzone>

    <mat-error *ngIf="fileControl.hasError('required')" i18n>
      A ZIP file is required
    </mat-error>
  </mat-form-field>
</div>

<div mat-dialog-actions align="end">
  <button mat-raised-button color="primary"
          (click)="processUpload()"
          [disabled]="isUploading || fileControl.invalid"
          i18n="@@Upload">
    <mat-icon>cloud_upload</mat-icon> Upload
  </button>

  <button mat-button (click)="close(false)" i18n="@@Cancel">
    Cancel
  </button>
</div>
