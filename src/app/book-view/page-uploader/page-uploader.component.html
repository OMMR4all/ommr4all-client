<app-api-error-card
  *ngIf="apiError"
  [apiError]="apiError"
  (dismiss)="apiError = null">
</app-api-error-card>

<mat-form-field appearance="outline" style="width: 100%;">
  <mat-label i18n>Upload Pages (Images or PDF)</mat-label>

  <ngx-mat-dropzone
    (change)="onSelect($event)"
    accept="image/*,application/pdf"
    multiple="true">

    <div style="display: flex; align-items: center; gap: 10px; padding: 10px;">
      <mat-icon color="primary">add_photo_alternate</mat-icon>
      <span *ngIf="uploadingFiles.size === 0" i18n>Click or drag pages here</span>
      <span *ngIf="uploadingFiles.size > 0" i18n>
        Uploading {{ uploadingFiles.size }} file(s)...
      </span>
    </div>

  </ngx-mat-dropzone>

  <mat-hint i18n>Max file size: 500MB</mat-hint>
</mat-form-field>

<mat-progress-bar
  *ngIf="uploadingFiles.size > 0"
  mode="indeterminate"
  style="margin-top: 10px;">
</mat-progress-bar>
