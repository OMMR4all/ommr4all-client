<div class="global-dropzone-overlay" [class.active]="isDraggingGlobal">
  <div class="overlay-content">
    <mat-icon>cloud_upload</mat-icon>
    <h2 i18n>Drop files anywhere to upload</h2>
  </div>
</div>

@if (apiError) {
  <app-api-error-card
    [apiError]="apiError"
    (dismiss)="apiError = null">
  </app-api-error-card>
}

<mat-form-field appearance="outline" style="width: 100%;">
  <mat-label i18n>Upload Pages</mat-label>

  <ngx-mat-dropzone>
    <input type="file"
      fileInput
      multiple
      accept="image/*,application/pdf"
      [(ngModel)]="tempFiles"
      (ngModelChange)="onSelect($event)" />

    <div style="padding: 20px;">
      <mat-icon color="primary">add_photo_alternate</mat-icon>
      @if (uploadingFiles.size === 0) {
        <span>Click or drag pages here</span>
      }
      @if (uploadingFiles.size > 0) {
        <span>Uploading {{ uploadingFiles.size }} file(s)...</span>
      }
    </div>
  </ngx-mat-dropzone>
</mat-form-field>

@if (uploadingFiles.size > 0) {
  <mat-progress-bar
    mode="indeterminate"
    style="margin-top: 10px;">
  </mat-progress-bar>
}
