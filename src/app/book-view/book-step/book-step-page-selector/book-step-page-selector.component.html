<mat-card appearance="outlined">
  <mat-card-header>
    <mat-icon mat-card-avatar>playlist_add</mat-icon>
    <mat-card-title i18n>Select pages</mat-card-title>
  </mat-card-header>

  <mat-card-content class="flex-col gap-10">
    <div>
      Selected pages
      @if (pageSelectionResult | async) {
        <span>
          {{ (pageSelectionResult | async).pages.length + '/' + (pageSelectionResult | async).totalPages }}
        </span>
      }
    </div>

    <div class="flex-row gap-40 align-center">
      <mat-radio-group
        class="flex-row gap-40 align-center"
        [(ngModel)]="selection.count"
        (change)="updateSelectionCount()">

        <mat-radio-button [value]="PageCount.All" i18n>All</mat-radio-button>
        <mat-radio-button [value]="PageCount.Unprocessed" i18n>Unprocessed</mat-radio-button>
        <mat-radio-button [value]="PageCount.Unlocked" i18n>Unlocked</mat-radio-button>
        <mat-radio-button [value]="PageCount.Custom" [disabled]="false" i18n>Manual</mat-radio-button>
      </mat-radio-group>

      @if (selection.count === PageCount.Custom) {
        <div>
          <form class="example-form">
            <mat-form-field class="example-full-width">
              <mat-label i18n>Selected Pages</mat-label>
              <input matInput placeholder="1-12" [(ngModel)]="selection.selected_pages_range_as_regex" name="selected_pages">
            </mat-form-field>
          </form>
        </div>
      }

      <button  mat-raised-button [disabled]="true" i18n>Edit</button>
    </div>
  </mat-card-content>
</mat-card>
