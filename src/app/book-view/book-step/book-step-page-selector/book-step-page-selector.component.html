<mat-card appearance="outlined">
  <mat-card-header>
    <mat-icon mat-card-avatar>playlist_add</mat-icon>
    <mat-card-title>Select pages</mat-card-title>
  </mat-card-header>

  <mat-card-content class="flex-col gap-10">
    <div>
      Selected pages
      <span *ngIf="pageSelectionResult | async">
        {{ (pageSelectionResult | async).pages.length + '/' + (pageSelectionResult | async).totalPages }}
      </span>
    </div>

    <div class="flex-row gap-40 align-center">
      <mat-radio-group
        class="flex-row gap-40 align-center"
        [(ngModel)]="selection.count"
        (change)="updateSelectionCount()">

        <mat-radio-button [value]="PageCount.All">All</mat-radio-button>
        <mat-radio-button [value]="PageCount.Unprocessed">Unprocessed</mat-radio-button>
        <mat-radio-button [value]="PageCount.Unlocked">Unlocked</mat-radio-button>
        <mat-radio-button [value]="PageCount.Custom" [disabled]="false">Manual</mat-radio-button>
      </mat-radio-group>

      <div *ngIf="selection.count === PageCount.Custom">
        <form class="example-form">
          <mat-form-field class="example-full-width">
            <mat-label>Selected Pages</mat-label>
            <input matInput placeholder="1-12" [(ngModel)]="selection.selected_pages_range_as_regex" name="selected_pages">
          </mat-form-field>
        </form>
      </div>

      <button mat-raised-button [disabled]="true">Edit</button>
    </div>
  </mat-card-content>
</mat-card>
