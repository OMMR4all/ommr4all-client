<h1 mat-dialog-title>Rename page <span class="book-title">{{ title }}</span></h1>
<div mat-dialog-content class="full-width">
  <form>
    <mat-form-field>
      <input matInput placeholder="Name" i18n-placeholder [formControl]="nameFormControl" [errorStateMatcher]="matcher">
    </mat-form-field>
    @if (nameFormControl.hasError('pattern')) {
      <mat-error i18n>Please enter a valid name (Characters, digits or underscore).</mat-error>
    }
    @if (errorMessage) {
      <mat-error>{{errorMessage}}</mat-error>
    }
  </form>
</div>
<div mat-dialog-actions align="end">
  <button mat-raised-button color="primary" (click)="onConfirm()" [disabled]="nameFormControl.hasError('pattern')" i18n="@@save">Save</button>
  <button mat-raised-button color="cancel" (click)="close(false)" i18n="@@cancel">Cancel</button>
</div>
