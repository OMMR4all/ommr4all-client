<mat-expansion-panel appearance="outlined">
  <mat-expansion-panel-header>
    <mat-panel-title>
      <mat-icon style="margin-right: 8px;">palette</mat-icon> Pattern Style Settings
    </mat-panel-title>
  </mat-expansion-panel-header>

  <div class="config-grid">
    <div class="config-section">
      <h3>Bounding Box</h3>

      <div class="setting-row">
        <label>Border Color</label>
        <input type="color" [(ngModel)]="config.borderColor" (ngModelChange)="onStyleChange()">
      </div>
      <div class="setting-row" style="margin-top: -8px;">
        <label style="font-size: 12px; color: #666;">Opacity ({{ config.borderOpacity * 100 | number:'1.0-0' }}%)</label>
        <input type="range" min="0" max="1" step="0.05" [(ngModel)]="config.borderOpacity" (ngModelChange)="onStyleChange()" style="flex: 1; margin-left: 10px;">
      </div>

      <div class="setting-row">
        <label>Background</label>
        <div class="controls">
          <mat-checkbox [(ngModel)]="isBgTransparent" (ngModelChange)="onStyleChange()">Transparent</mat-checkbox>
          <input type="color" [disabled]="isBgTransparent" [(ngModel)]="activeBgColor" (ngModelChange)="onStyleChange()">
        </div>
      </div>
      <div class="setting-row" style="margin-top: -8px;" [style.opacity]="isBgTransparent ? '0.3' : '1'">
        <label style="font-size: 12px; color: #666;">Opacity ({{ config.bgOpacity * 100 | number:'1.0-0' }}%)</label>
        <input type="range" min="0" max="1" step="0.05" [disabled]="isBgTransparent" [(ngModel)]="config.bgOpacity" (ngModelChange)="onStyleChange()" style="flex: 1; margin-left: 10px;">
      </div>
    </div>

    <div class="config-section">
      <h3>Label</h3>

      <div class="setting-row">
        <label>Text Color</label>
        <input type="color" [(ngModel)]="config.labelTextColor" (ngModelChange)="onStyleChange()">
      </div>
      <div class="setting-row" style="margin-top: -8px;">
        <label style="font-size: 12px; color: #666;">Opacity ({{ config.labelTextOpacity * 100 | number:'1.0-0' }}%)</label>
        <input type="range" min="0" max="1" step="0.05" [(ngModel)]="config.labelTextOpacity" (ngModelChange)="onStyleChange()" style="flex: 1; margin-left: 10px;">
      </div>

      <div class="setting-row">
        <label>Background</label>
        <div class="controls">
          <mat-checkbox [(ngModel)]="isLabelBgTransparent" (ngModelChange)="onStyleChange()">Transparent</mat-checkbox>
          <input type="color" [disabled]="isLabelBgTransparent" [(ngModel)]="activeLabelBgColor" (ngModelChange)="onStyleChange()">
        </div>
      </div>
      <div class="setting-row" style="margin-top: -8px;" [style.opacity]="isLabelBgTransparent ? '0.3' : '1'">
        <label style="font-size: 12px; color: #666;">Opacity ({{ config.labelBgOpacity * 100 | number:'1.0-0' }}%)</label>
        <input type="range" min="0" max="1" step="0.05" [disabled]="isLabelBgTransparent" [(ngModel)]="config.labelBgOpacity" (ngModelChange)="onStyleChange()" style="flex: 1; margin-left: 10px;">
      </div>

      <div class="setting-row">
        <label>Border Color</label>
        <div class="controls">
          <mat-checkbox [(ngModel)]="isLabelBorderTransparent" (ngModelChange)="onStyleChange()">Transparent</mat-checkbox>
          <input type="color" [disabled]="isLabelBorderTransparent" [(ngModel)]="activeLabelBorderColor" (ngModelChange)="onStyleChange()">
        </div>
      </div>
      <div class="setting-row" style="margin-top: -8px;" [style.opacity]="isLabelBorderTransparent ? '0.3' : '1'">
        <label style="font-size: 12px; color: #666;">Opacity ({{ config.labelBorderOpacity * 100 | number:'1.0-0' }}%)</label>
        <input type="range" min="0" max="1" step="0.05" [disabled]="isLabelBorderTransparent" [(ngModel)]="config.labelBorderOpacity" (ngModelChange)="onStyleChange()" style="flex: 1; margin-left: 10px;">
      </div>
    </div>
  </div>
</mat-expansion-panel>
