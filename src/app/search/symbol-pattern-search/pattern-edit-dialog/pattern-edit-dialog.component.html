<h2 mat-dialog-title style="display: flex; justify-content: space-between; align-items: center; margin: 0; background: #fff; z-index: 20; position: relative; flex-shrink: 0;">
  <span>Edit Patterns: {{ data.page_id }}</span>
  <div style="display: flex; align-items: center; gap: 4px;">
    <button mat-icon-button (click)="resetView()" title="Reset Zoom" i18n-title>
      <mat-icon>zoom_out_map</mat-icon>
    </button>
    <button mat-icon-button color="warn" (click)="deleteSelectedBox()" [disabled]="!selectedBox" title="Delete Selected" i18n-title>
      <mat-icon>delete</mat-icon>
    </button>
    <button mat-stroked-button
            (click)="exportPdf()"
            [disabled]="pdfExporting"
            title="Export this page to PDF" i18n-title
            style="margin-left: 8px;">
      @if (pdfExporting) {
        <mat-spinner diameter="16" style="display: inline-block; vertical-align: middle; margin-right: 4px;"></mat-spinner>
      } @else {
        <mat-icon>picture_as_pdf</mat-icon>
      }
      Export PDF
    </button>
  </div>
</h2>

<mat-dialog-content
  style="padding: 0; margin: 0; background: #222; overflow: hidden; display: flex; align-items: center; justify-content: center; flex: 1; max-height: none;"
  (wheel)="onWheel($event)"
  (mousedown)="onMouseDown($event)"
  (mousemove)="onMouseMove($event)"
  (mouseup)="onMouseUp()"
  (mouseleave)="onMouseUp()">

  <div [style.transform]="'scale(' + zoom + ') translate(' + panX + 'px, ' + panY + 'px)'"
       style="transform-origin: center center; transition: transform 0.05s linear; display: flex; justify-content: center; align-items: center; width: 100%; height: 100%;">

    <div #svgWrapper class="shrink-wrapper">

      <app-secured-image [src]="data.pageCom.image_url('color', 'highres_preproc')"></app-secured-image>

      <svg class="bounding-box-svg" viewBox="0 0 1 1" style="background: none; pointer-events: none;">
        @for (match of data.matches; track match) {
          @for (box of match.boxes; track box) {

            <rect
              [attr.x]="box.x" [attr.y]="box.y"
              [attr.width]="box.w" [attr.height]="box.h"
              [attr.fill]="data.styles?.backgroundColor || 'transparent'"
              [attr.fill-opacity]="data.styles?.bgOpacity ?? 0.35"
              [attr.stroke]="selectedBox === box ? '#007bff' : (data.styles?.borderColor || '#000')"
              [attr.stroke-opacity]="data.styles?.borderOpacity ?? 1.0"
              stroke-width="2"
              vector-effect="non-scaling-stroke"
              style="cursor: move; pointer-events: auto;"
              (mousedown)="onBoxMouseDown($event, box)"
            />

            <svg
              [attr.x]="box.x + box.w - 0.015"
              [attr.y]="box.y - 0.015"
              width="0.015" height="0.015"
              viewBox="0 0 100 100" preserveAspectRatio="none" style="pointer-events: none;">
              <rect x="0" y="0" width="100" height="100"
                    [attr.fill]="data.styles?.labelBgColor || 'transparent'"
                    [attr.fill-opacity]="data.styles?.labelBgOpacity ?? 1.0"
                    [attr.stroke]="data.styles?.labelBorderColor || 'none'"
                    [attr.stroke-opacity]="data.styles?.labelBorderOpacity ?? 1.0"
                    stroke-width="0"
                    vector-effect="non-scaling-stroke" />

              <text x="50" y="55"
                    font-size="65"
                    text-anchor="middle"
                    dominant-baseline="middle"
                    [attr.fill]="data.styles?.labelTextColor || '#ffffff'"
                    [attr.fill-opacity]="data.styles?.labelTextOpacity ?? 1.0"
                    style="font-family: sans-serif; font-weight: bold;">
                {{ match.patternIndex + 1 }}
              </text>
            </svg>

            @if (selectedBox === box) {
              <rect
                [attr.x]="box.x + box.w - 0.01" [attr.y]="box.y + box.h - 0.01"
                width="0.02" height="0.02"
                fill="#007bff" stroke="#fff" stroke-width="1"
                vector-effect="non-scaling-stroke"
                style="cursor: nwse-resize; pointer-events: auto;"
                (mousedown)="onResizeMouseDown($event, box)"
              />
            }
          }
        }
      </svg>
    </div>

  </div>
</mat-dialog-content>

<mat-dialog-actions align="end" style="margin: 0; flex-shrink: 0; background: #fff; z-index: 20; position: relative;">
  <button  mat-button mat-dialog-close i18n>Cancel</button>
  <button  mat-flat-button color="primary" (click)="saveChanges()" i18n>Save Changes</button>
</mat-dialog-actions>
