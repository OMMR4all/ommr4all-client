<h1 mat-dialog-title>{{ algorithmName }}</h1>
<div mat-dialog-content>
  @if (!task) {
    <app-algorithm-predictor-settings
      [algorithmGroup]="data.algorithmGroup"
      [book]="data.pageState.bookCom"
      [bookMeta]="data.pageState.bookMeta"
    ></app-algorithm-predictor-settings>
  }
  @if (task) {
    <div>
      <app-api-error-card [apiError]="task.apiError" (dismiss)="task.dismissError()"></app-api-error-card>
      @if (!task.isWorking || task.status.progress <= 0) {
        <div>
          <mat-progress-bar mode="indeterminate"></mat-progress-bar>
        </div>
      }
      @if (task.isWorking && task.status.progress > 0) {
        <div>
          <mat-progress-bar [value]="task.status.progress * 100"></mat-progress-bar>
        </div>
      }
    </div>
  }
</div>
<div mat-dialog-actions align="end">
  @if (!task) {
    <button mat-raised-button color="primary" (click)="run()" i18n="@@Run"><mat-icon>directions_run</mat-icon> Run</button>
  }
  @if (!task) {
    <button mat-raised-button (click)="close(false)" i18n="@@Close"><mat-icon>close</mat-icon> Close</button>
  }
  @if (task) {
    <button mat-raised-button color="warn" (click)="cancel()" i18n="@@Cancel"><mat-icon>cancel</mat-icon> Cancel</button>
  }
</div>
