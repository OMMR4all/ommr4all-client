<h1 mat-dialog-title>
  {{title}}
</h1>

<div mat-dialog-content>
  <p>{{message}}</p>
</div>

<div mat-dialog-actions align="end">
  <button  mat-raised-button (click)="onCancel()" i18n>Cancel</button>
  <button  mat-raised-button (click)="onEdit()" i18n>Switch to Editor</button>
  <button  mat-raised-button color="primary" (click)="onView()" i18n>Switch to View</button>
</div>
