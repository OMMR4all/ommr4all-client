@if (textLine) {
  <svg:g>
    @for (poly of textLine.polygons; track poly.id) {
      <g
        app-element-polyline [polyLine]="poly"
      ></g>
    }
    @if (true) {
      <g>
        <g app-polyline-editor
          [polyLines]="textLine.polygons"
        ></g>
      </g>
    }
    </svg:g>
  }
