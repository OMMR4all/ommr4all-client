@if (errorMessage !== '') {
  <div i18n>
  An error occurred:
  {{ errorMessage }}
</div>
}
<div class="page-list">
  @for (page of pages; track pageId($index, page)) {
    <div class="page-preview-wrapper"
      >
      <app-page-preview [page]="page.page" [progress]="page.progress" [selected]="selected(page.page)"
        (click)="onPageClick(page.page)"
        class="page-preview"
      ></app-page-preview>
    </div>
  }
</div>
